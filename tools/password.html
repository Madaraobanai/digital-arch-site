<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Password Generator</title>
<link rel="stylesheet" href="../style.css">
</head>

<body>

<h1>🔐 Password Generator</h1>

<input type="number" id="tamanho" value="12" min="4" max="32">
<br>
<button onclick="gerar()">Generate</button>
<button onclick="copiar()">Copy</button>

<p id="senha"></p>

<script>
function gerar() {
  const tamanho = document.getElementById("tamanho").value;
  const chars = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%";
  let senha = "";

  for (let i = 0; i < tamanho; i++) {
    senha += chars[Math.floor(Math.random() * chars.length)];
  }

  document.getElementById("senha").innerText = senha;
}

function copiar() {
  navigator.clipboard.writeText(document.getElementById("senha").innerText);
  alert("Copied!");
}
</script>

</body>
</html>
